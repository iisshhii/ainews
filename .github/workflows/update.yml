name: Daily AI News Update

on:
  schedule:
    - cron: '0 0 * * *' # 毎日 00:00 UTC (日本時間 09:00) に実行
  workflow_dispatch: # 手動実行も可能

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser google-genai jinja2 python-dotenv requests pytz

    - name: Run news update script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TZ: Asia/Tokyo
      run: python main.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update news curation [skip ci]" && git push)
